{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Resources</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="{% static 'map_app/css/style.css' %}">
</head>
<body>

    <!-- ── HOME VIEW ──────────────────────────────────────────────────────── -->
    <div id="home-view">
        <header>
            <i class="fa-solid fa-shield-heart header-app-icon"></i>
            <h1>Survival Resources — EMERGENCIES ONLY</h1>
        </header>

        <div class="main-content">
            <div class="button-grid">

                <button class="category-btn" onclick="openMapCategory('shelter')">
                    <div class="icon-box">
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span class="category-label">Shelter</span>
                </button>

                <button class="category-btn" onclick="openMapCategory('food')">
                    <div class="icon-box">
                        <i class="fa-solid fa-utensils"></i>
                    </div>
                    <span class="category-label">Food</span>
                </button>

                <button class="category-btn btn-medical" onclick="openMapCategory('medical')">
                    <div class="icon-box">
                        <i class="fa-solid fa-hospital"></i>
                    </div>
                    <span class="category-label">ER / Medical</span>
                </button>

                <button class="category-btn" onclick="openMapCategory('rehab')">
                    <div class="icon-box">
                        <i class="fa-solid fa-heart-pulse"></i>
                    </div>
                    <span class="category-label">Rehab</span>
                </button>

            </div>
        </div>

        <footer>
            For non-emergency resources, call <strong>211</strong> or visit
            <a href="https://www.211.org" target="_blank" rel="noopener">211.org</a>
        </footer>
    </div>


    <!-- ── MAP VIEW ───────────────────────────────────────────────────────── -->
    <div id="map-view">
        <div class="map-bar">
            <button class="back-btn" onclick="closeMap()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <span id="map-title" class="map-title-text">Finding Resources…</span>
            <div class="radius-selector">
                <label for="radius-select" class="radius-label">Radius:</label>
                <select id="radius-select" onchange="updateRadius()">
                    <option value="2000"  selected>1.2 mi</option>
                    <option value="5000">3.1 mi</option>
                    <option value="10000">6.2 mi</option>
                    <option value="25000">15.5 mi</option>
                </select>
            </div>
        </div>

        <div id="loading-info" class="info-loading">Gathering your location…</div>
        <div id="map"></div>
    </div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="{% static 'map_app/js/script.js' %}?v=5"></script>
</body>
</html>
