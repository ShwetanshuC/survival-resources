{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ensure proper scaling on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Resources</title>

    <!-- Leaflet CSS for Map Rendering -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- FontAwesome for the Button Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <!-- Load external style definitions securely from Django statically grouped directory -->
    <link rel="stylesheet" href="{% static 'map_app/css/style.css' %}">
</head>
<body>

    <!-- ==============================================
         HOME VIEW: Contains the 4 Category Buttons
         ============================================== -->
    <div id="home-view">
        <header>
            <div class="header-icon-placeholder">Icon here</div>
            <h1>Survival Resources—ONLY FOR EMERGENCIES</h1>
        </header>

        <div class="main-content">
            <div class="button-grid">
                
                <!-- Shelter Button -->
                <button class="category-btn" onclick="openMapCategory('shelter')">
                    <div class="icon-box">
                        <!-- House Icon representing Shelter -->
                        <i class="fa-solid fa-house"></i>
                    </div>
                    <span class="category-label">Shelter</span>
                </button>

                <!-- Food Button -->
                <button class="category-btn" onclick="openMapCategory('food')">
                    <div class="icon-box">
                        <!-- Fork/Plate/Knife Icon representing Food -->
                        <i class="fa-solid fa-utensils"></i>
                    </div>
                    <span class="category-label">Food</span>
                </button>

                <!-- ER/Medical Button -->
                <button class="category-btn" onclick="openMapCategory('medical')">
                    <div class="icon-box">
                        <!-- Hospital Building Icon representing ER/Medical -->
                        <i class="fa-solid fa-hospital"></i>
                    </div>
                    <span class="category-label">ER/Medical</span>
                </button>

                <!-- Rehab Button -->
                <button class="category-btn" onclick="openMapCategory('rehab')">
                    <div class="icon-box">
                        <!-- Medical cross/pulse referencing health restoration -->
                        <i class="fa-solid fa-heart-pulse"></i>
                    </div>
                    <span class="category-label">Rehab</span>
                </button>

            </div>
        </div>

        <footer>
            For non-emergent resources, please consult 211: <a href="https://www.211.org" target="_blank">https://www.211.org</a>
        </footer>
    </div>


    <!-- ==============================================
         MAP VIEW: Contains Leaflet Map targeting the specific category
         ============================================== -->
    <div id="map-view">
        <div class="map-bar">
            <!-- Allows user to go back to the home view smoothly -->
            <button class="back-btn" onclick="closeMap()"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <span id="map-title" style="font-weight:bold; font-size:18px;">Finding Resources...</span>
            <!-- Dropdown to select search radius dynamically -->
            <div class="radius-selector" style="display:flex; align-items:center; gap:5px;">
                <label for="radius-select" style="font-size:14px; display:none;" id="radius-label">Radius:</label>
                <select id="radius-select" onchange="updateRadius()" style="padding:5px; border-radius:5px; font-weight:bold; cursor:pointer;">
                    <option value="2000" selected>1.2 mi (Walk)</option>
                    <option value="5000">3.1 mi (Short Drive)</option>
                    <option value="10000">6.2 mi (Drive)</option>
                    <option value="25000">15.5 mi (Wide Search)</option>
                </select>
            </div>
        </div>
        <div id="loading-info">Gathering location...</div>
        <div id="map"></div>
    </div>


    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- External SPA script module for geolocation and category mapping -->
    <script src="{% static 'map_app/js/script.js' %}"></script>
</body>
</html>
