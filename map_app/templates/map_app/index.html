{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Find free food, shelters, medical help, and rehab centers near you — no sign-up required.">
    <meta name="theme-color" content="#1a529c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="{% static 'map_app/manifest.json' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🆘</text></svg>">
    <title>Emergency Resources Near Me — Food, Shelter, Medical, Rehab</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="{% static 'map_app/css/style.css' %}">
</head>
<body>

    <!-- ── HOME VIEW ──────────────────────────────────────────────────────── -->
    <div id="home-view">
        <header>
            <i class="fa-solid fa-shield-heart header-app-icon"></i>
            <h1>Survival Resources — EMERGENCIES ONLY</h1>
        </header>

        <div class="main-content">
            <div class="button-grid-wrapper">

                <div class="row-label">Permanent Resources</div>
                <div class="button-grid">

                    <button class="category-btn" onclick="openMapCategory('food')" aria-label="Find food banks and pantries near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-utensils"></i>
                        </div>
                        <span class="category-label">Food</span>
                    </button>

                    <button class="category-btn" onclick="openMapCategory('shelter')" aria-label="Find shelters near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-house"></i>
                        </div>
                        <span class="category-label">Shelter</span>
                    </button>

                    <button class="category-btn btn-medical" onclick="openMapCategory('medical')" aria-label="Find medical clinics near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-hospital"></i>
                        </div>
                        <span class="category-label">ER / Medical</span>
                    </button>

                    <button class="category-btn" onclick="openMapCategory('rehab')" aria-label="Find rehabilitation centers near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-heart-pulse"></i>
                        </div>
                        <span class="category-label">Rehab</span>
                    </button>

                </div>

                <div class="row-separator"></div>

                <div class="row-label">Live Events</div>
                <div class="button-grid">

                    <button class="category-btn" onclick="openMapCategory('food_events')" aria-label="Find live food distribution events near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-apple-whole"></i>
                        </div>
                        <span class="category-label">Food Events</span>
                    </button>

                    <button class="category-btn" onclick="openMapCategory('shelter_events')" aria-label="Find live shelter events near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-campground"></i>
                        </div>
                        <span class="category-label">Shelter Events</span>
                    </button>

                    <button class="category-btn" onclick="openMapCategory('medical_events')" aria-label="Find live medical events near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-stethoscope"></i>
                        </div>
                        <span class="category-label">Medical Events</span>
                    </button>

                    <button class="category-btn" onclick="openMapCategory('rehab_events')" aria-label="Find live rehabilitation events near me">
                        <div class="icon-box">
                            <i class="fa-solid fa-hand-holding-heart"></i>
                        </div>
                        <span class="category-label">Rehab Events</span>
                    </button>

                </div>

            </div>
        </div>

        <footer>
            For non-emergency resources, call <strong>211</strong> or visit
            <a href="https://www.211.org" target="_blank" rel="noopener">211.org</a>
        </footer>
    </div>


    <!-- ── MAP VIEW ───────────────────────────────────────────────────────── -->
    <div id="map-view">
        <div class="map-bar">
            <button class="back-btn" onclick="closeMap()">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
            <span id="map-title" class="map-title-text">Finding Resources…</span>
            <div class="radius-selector">
                <label for="radius-select" class="radius-label">Radius:</label>
                <select id="radius-select" onchange="updateRadius()">
                    <option value="2000"  selected>1.2 mi</option>
                    <option value="5000">3.1 mi</option>
                    <option value="10000">6.2 mi</option>
                    <option value="25000">15.5 mi</option>
                </select>
            </div>
            <button id="share-btn" class="share-btn" onclick="shareCurrentView()" title="Share this page" style="display:none;" aria-label="Share this page">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
        </div>

        <div id="loading-info" class="info-loading">Gathering your location…</div>
        <div id="map"></div>
    </div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="{% static 'map_app/js/script.js' %}?v=20"></script>
</body>
</html>
